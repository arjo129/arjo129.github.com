<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sci-Fi AI Analysis Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#252840; --accent:#7c6af7;
  --accent2:#56cfe1; --accent3:#ff9f43; --text:#e2e8f0; --muted:#8892a4; --border:#2d3353;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:-.4px}
header span{color:var(--muted);font-size:.9rem}
.container{max-width:1400px;margin:0 auto;padding:24px 32px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.kpi .val{font-size:2.2rem;font-weight:700;color:var(--accent)}
.kpi .lbl{font-size:.78rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-full{grid-column:1/-1}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-box h2{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:16px}
.chart-box canvas{max-height:280px}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.filters input,.filters select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:.875rem;outline:none}
.filters input{min-width:240px}
.filters input:focus,.filters select:focus{border-color:var(--accent)}
#count-label{color:var(--muted);font-size:.85rem;padding:8px 0 12px}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:var(--surface2);color:var(--muted);text-align:left;padding:10px 14px;font-weight:600;text-transform:uppercase;font-size:.73rem;letter-spacing:.06em;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th .si{opacity:.4;margin-left:4px}
thead th.sorted .si{opacity:1;color:var(--accent)}
tbody tr{border-top:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;vertical-align:top}
td.reasoning{color:var(--muted);font-size:.8rem;line-height:1.45;max-width:380px}
td.title-cell{font-weight:600;color:var(--accent2);min-width:180px}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:600;white-space:nowrap}
.b-antag{background:#3d1a1a;color:#ff7b7b}
.b-prot{background:#1a3d2a;color:#56e39f}
.b-ment{background:#1a2f3d;color:var(--accent2)}
.b-tool{background:#2d2a1a;color:#ffd166}
.b-none{background:#222;color:var(--muted)}
.pips{display:inline-flex;gap:2px;vertical-align:middle}
.pip{width:8px;height:8px;border-radius:50%;border:1px solid var(--border);background:var(--surface2)}
.pip.on{background:var(--accent);border-color:var(--accent)}
.pagination{display:flex;gap:8px;align-items:center;justify-content:center;padding:20px 0 8px;flex-wrap:wrap}
.pagination button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.85rem}
.pagination button:hover{border-color:var(--accent);color:var(--accent)}
.pagination button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination span{color:var(--muted);font-size:.82rem}
@media(max-width:768px){.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>&#x1F680; Sci-Fi AI Analysis Dashboard</h1>
  <span>861 books &bull; AI portrayal analysis</span>
</header>
<div class="container">
  <div class="kpi-row" id="kpi-row"></div>
  <div class="charts-grid">
    <div class="chart-box chart-full">
      <h2>Impact Rating Distribution</h2>
      <canvas id="chart-rating"></canvas>
    </div>
    <div class="chart-box">
      <h2>AI Type — top categories</h2>
      <canvas id="chart-aitype"></canvas>
    </div>
    <div class="chart-box">
      <h2>Primary Role</h2>
      <canvas id="chart-role"></canvas>
    </div>
  </div>
  <div class="chart-box" style="margin-bottom:28px">
    <h2>Average Impact Rating by AI Type (books with AI)</h2>
    <canvas id="chart-avg" style="max-height:300px"></canvas>
  </div>
  <div class="chart-box" style="margin-bottom:28px">
    <h2>Antagonist vs Protagonist by AI Type</h2>
    <canvas id="chart-role-type" style="max-height:320px"></canvas>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Search title / reasoning</label>
      <input type="text" id="search" placeholder="e.g. HAL 9000, robot, antagonist…"/>
    </div>
    <div class="filter-group">
      <label>AI Type</label>
      <select id="f-type"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Primary Role</label>
      <select id="f-role"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Min Rating</label>
      <select id="f-rmin"><option value="">Any</option><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    </div>
    <div class="filter-group">
      <label>Max Rating</label>
      <select id="f-rmax"><option value="">Any</option><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
    </div>
  </div>
  <div id="count-label"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th data-col="title">Title <span class="si">&#x25B4;</span></th>
        <th data-col="ai_type">AI Type <span class="si">&#x25B4;</span></th>
        <th data-col="primary_role">Role <span class="si">&#x25B4;</span></th>
        <th data-col="impact_rating">Rating <span class="si">&#x25B4;</span></th>
        <th>Reasoning</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="pagination"></div>
</div>

const PALETTE=['#7c6af7','#56cfe1','#ff9f43','#ff6b6b','#a29bfe','#00cec9','#fdcb6e','#e17055','#6c5ce7','#74b9ff','#55efc4','#fd79a8','#ffeaa7','#dfe6e9','#b2bec3','#636e72'];
const CHART_OPTS={plugins:{legend:{display:false}},scales:{x:{grid:{color:'#2d3353'},ticks:{color:'#8892a4'}},y:{grid:{color:'#2d3353'},ticks:{color:'#8892a4'}}}};

function buildKPI(){
  const withAI=RAW.filter(r=>!['N/A','None','null',null].includes(r.ai_type)).length;
  const avg=(RAW.reduce((s,r)=>s+r.impact_rating,0)/RAW.length).toFixed(2);
  const antag=RAW.filter(r=>r.primary_role==='Antagonist').length;
  const protag=RAW.filter(r=>r.primary_role==='Protagonist').length;
  const high=RAW.filter(r=>r.impact_rating>=4).length;
  [{val:RAW.length,lbl:'Total Books'},{val:withAI,lbl:'With AI'},{val:avg,lbl:'Avg Impact Rating'},
   {val:antag,lbl:'Antagonist AIs'},{val:protag,lbl:'Protagonist AIs'},{val:high,lbl:'High Impact (≥ 4)'}]
  .forEach(k=>{
    const d=document.createElement('div');
    d.className='kpi';
    d.innerHTML=`<div class="val">${k.val}</div><div class="lbl">${k.lbl}</div>`;
    document.getElementById('kpi-row').appendChild(d);
  });
}

function buildRatingChart(){
  const labels=['1 – Minimal','2 – Moderate','3 – Significant','4 – Major','5 – Central'];
  const data=[1,2,3,4,5].map(i=>RAW.filter(r=>r.impact_rating===i).length);
  new Chart(document.getElementById('chart-rating'),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:PALETTE.slice(0,5),borderRadius:6,borderSkipped:false}]},
    options:{...CHART_OPTS,plugins:{legend:{display:false}}}});
}

function buildAITypeChart(){
  const cats=['Disembodied AI','Robot','Cyborg','Hive Mind','Android','Tool/Background'];
  const counts=cats.map(t=>RAW.filter(r=>r.ai_type===t).length);
  const na=RAW.filter(r=>['N/A','None','null',null].includes(r.ai_type)).length;
  new Chart(document.getElementById('chart-aitype'),{type:'doughnut',
    data:{labels:[...cats,'No AI / N/A'],datasets:[{data:[...counts,na],backgroundColor:PALETTE,borderColor:'#0f1117',borderWidth:2}]},
    options:{plugins:{legend:{position:'right',labels:{color:'#8892a4',boxWidth:12,padding:10}}},cutout:'55%'}});
}

function buildRoleChart(){
  const roles=['Antagonist','Tool/Background','Protagonist','Mentor','None/N/A'];
  const counts=[
    RAW.filter(r=>r.primary_role==='Antagonist').length,
    RAW.filter(r=>['Tool/Background','Background'].includes(r.primary_role)).length,
    RAW.filter(r=>r.primary_role==='Protagonist').length,
    RAW.filter(r=>r.primary_role==='Mentor').length,
    RAW.filter(r=>['None','N/A','null',null].includes(r.primary_role)).length,
  ];
  new Chart(document.getElementById('chart-role'),{type:'doughnut',
    data:{labels:roles,datasets:[{data:counts,backgroundColor:['#ff6b6b','#ffd166','#56e39f','#56cfe1','#636e72'],borderColor:'#0f1117',borderWidth:2}]},
    options:{plugins:{legend:{position:'right',labels:{color:'#8892a4',boxWidth:12,padding:10}}},cutout:'55%'}});
}

function buildAvgChart(){
  const types=['Disembodied AI','Robot','Cyborg','Hive Mind','Android','Tool/Background'];
  const avgs=types.map(t=>{
    const s=RAW.filter(r=>r.ai_type===t);
    return s.length?(s.reduce((a,r)=>a+r.impact_rating,0)/s.length).toFixed(2):0;
  });
  new Chart(document.getElementById('chart-avg'),{type:'bar',
    data:{labels:types,datasets:[{label:'Avg Rating',data:avgs,backgroundColor:PALETTE.slice(0,6),borderRadius:6,borderSkipped:false}]},
    options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:'#2d3353'},ticks:{color:'#8892a4'}},y:{grid:{color:'#2d3353'},ticks:{color:'#8892a4'},min:0,max:5}}}});
}

function buildRoleByTypeChart(){
  const types=['Disembodied AI','Robot','Cyborg','Hive Mind','Android','Tool/Background'];
  const roles=[
    {label:'Antagonist',  color:'#ff6b6b'},
    {label:'Protagonist', color:'#56e39f'},
    {label:'Mentor',      color:'#56cfe1'},
    {label:'Tool/Background', color:'#ffd166'},
  ];
  const datasets=roles.map(({label,color})=>({
    label,
    data:types.map(t=>RAW.filter(r=>r.ai_type===t&&r.primary_role===label).length),
    backgroundColor:color,
    borderRadius:4,
    borderSkipped:false,
  }));
  new Chart(document.getElementById('chart-role-type'),{type:'bar',
    data:{labels:types,datasets},
    options:{
      plugins:{legend:{display:true,labels:{color:'#8892a4',boxWidth:12,padding:12}}},
      scales:{
        x:{stacked:true,grid:{color:'#2d3353'},ticks:{color:'#8892a4'}},
        y:{stacked:true,grid:{color:'#2d3353'},ticks:{color:'#8892a4'}}
      }
    }
  });
}

// Table
const PAGE=25;
let filtered=[...RAW],sortCol=null,sortDir=1,page=0;

function roleBadge(r){
  const cls={Antagonist:'b-antag',Protagonist:'b-prot',Mentor:'b-ment','Tool/Background':'b-tool',Background:'b-tool'}[r]||'b-none';
  return `<span class="badge ${cls}">${esc(r||'—')}</span>`;
}
function pips(n){
  return `<span class="pips">${[0,1,2,3,4,5].map(i=>`<span class="pip${i<=n?' on':''}"></span>`).join('')}</span> ${n}`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  const s=page*PAGE, sl=filtered.slice(s,s+PAGE);
  document.getElementById('tbody').innerHTML=sl.map(r=>`<tr>
    <td class="title-cell">${esc(r.title)}</td>
    <td>${esc(r.ai_type||'—')}</td>
    <td>${roleBadge(r.primary_role)}</td>
    <td>${pips(r.impact_rating)}</td>
    <td class="reasoning">${esc(r.reasoning||'')}</td>
  </tr>`).join('');
  document.getElementById('count-label').textContent=`${filtered.length} result${filtered.length!==1?'s':''} — page ${page+1} of ${Math.max(1,Math.ceil(filtered.length/PAGE))}`;
  renderPages();
}

function renderPages(){
  const total=Math.ceil(filtered.length/PAGE);
  const el=document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  const lo=Math.max(0,page-3),hi=Math.min(total-1,page+3);
  let h=`<button onclick="go(${page-1})" ${page===0?'disabled':''}>&#8592; Prev</button>`;
  if(lo>0)h+=`<button onclick="go(0)">1</button><span>…</span>`;
  for(let i=lo;i<=hi;i++)h+=`<button class="${i===page?'active':''}" onclick="go(${i})">${i+1}</button>`;
  if(hi<total-1)h+=`<span>…</span><button onclick="go(${total-1})">${total}</button>`;
  h+=`<button onclick="go(${page+1})" ${page===total-1?'disabled':''}>Next &#8594;</button>`;
  el.innerHTML=h;
}

window.go=p=>{
  page=Math.max(0,Math.min(Math.ceil(filtered.length/PAGE)-1,p));
  render();
  document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth',block:'start'});
};

function applyFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  const at=document.getElementById('f-type').value;
  const rl=document.getElementById('f-role').value;
  const rn=document.getElementById('f-rmin').value;
  const rx=document.getElementById('f-rmax').value;
  filtered=RAW.filter(r=>{
    if(q&&!r.title.toLowerCase().includes(q)&&!(r.reasoning||'').toLowerCase().includes(q)&&!(r.ai_type||'').toLowerCase().includes(q))return false;
    if(at&&r.ai_type!==at)return false;
    if(rl&&r.primary_role!==rl)return false;
    if(rn!==''&&r.impact_rating<+rn)return false;
    if(rx!==''&&r.impact_rating>+rx)return false;
    return true;
  });
  if(sortCol){
    filtered.sort((a,b)=>{
      let av=a[sortCol],bv=b[sortCol];
      if(typeof av==='string')av=av.toLowerCase();
      if(typeof bv==='string')bv=bv.toLowerCase();
      return av<bv?-sortDir:av>bv?sortDir:0;
    });
  }
  page=0;render();
}

// Sort headers
document.querySelectorAll('thead th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    sortDir=sortCol===col?-sortDir:1;sortCol=col;
    document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('sorted');t.querySelector('.si').textContent='▴';});
    th.classList.add('sorted');th.querySelector('.si').textContent=sortDir===1?'▲':'▼';
    applyFilter();
  });
});

// Build select options
const types=[...new Set(RAW.map(r=>r.ai_type).filter(Boolean))].sort();
const roles=[...new Set(RAW.map(r=>r.primary_role).filter(Boolean))].sort();
types.forEach(t=>document.getElementById('f-type').insertAdjacentHTML('beforeend',`<option>${t}</option>`));
roles.forEach(r=>document.getElementById('f-role').insertAdjacentHTML('beforeend',`<option>${r}</option>`));

['search','f-type','f-role','f-rmin','f-rmax'].forEach(id=>document.getElementById(id).addEventListener('input',applyFilter));

buildKPI();buildRatingChart();buildAITypeChart();buildRoleChart();buildAvgChart();buildRoleByTypeChart();
applyFilter();
</script>
