<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0" crossorigin="anonymous">
    <title>Voice AI Painter</title>
    <style>
        body { background: #f8f9fa; }
        canvas { border: 1px solid #ced4da; background: white; cursor: crosshair; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 100%; height: auto; }
        /*.controls { margin: 20px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }*/
        #status { font-weight: bold; color: #666; }
        .paint-shell { max-width: 800px; }
        .ai-log { width: 100%; height: 60px; background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; overflow-y: auto; border-radius: 4px; }
    </style>
</head>
<body>
    <header></header>

    <main class="py-4">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-xl-10 text-center">

    <h2>AI Voice Canvas</h2>
    <p>Hold <b>Spacebar</b> to talk. Try: <i>"Draw a blue circle where my mouse is"</i></p>
    <p>This demo requires microphone access and uses chrome's Prompt API. The LLM runs on your computer how cool is that!</p>
    <div class="paint-shell mx-auto text-start">
    <canvas id="paintCanvas" class="w-100" width="800" height="500"></canvas>

    <div class="d-flex flex-wrap align-items-center gap-2 mt-3">
        <button id="clearBtn" class="btn btn-outline-secondary btn-sm">Clear Canvas</button>
        <span id="status">Status: Ready</span>
    </div>

    <div class="ai-log mt-2" id="log">Generated code will appear here...</div>
    </div>


                    </div>
                </div>
            </div>
        </main>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        
        // 1. STATE & MOUSE TRACKING
        let mouseX = 0;
        let mouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // 2. THE PAINTBOT API (registered once, then used to build schema + runtime API)
        const PaintBot = { history: [] };
        const paintRegistry = new Map();

        function registerPaintOp(name, config, handler) {
            paintRegistry.set(name, {
                name,
                description: config.description,
                args: config.args
            });

            PaintBot[name] = (...args) => {
                handler(...args);
                PaintBot.history.push(`${name} ${args.join(',')}`);
            };
        }

        registerPaintOp('circle', {
            description: 'Draw a filled circle',
            args: [
                { name: 'x', schema: { type: 'number' } },
                { name: 'y', schema: { type: 'number' } },
                { name: 'radius', schema: { type: 'number', minimum: 1 } },
                { name: 'color', schema: { type: 'string' } }
            ]
        }, (x, y, r, color = 'black') => {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        });

        registerPaintOp('rect', {
            description: 'Draw a filled rectangle',
            args: [
                { name: 'x', schema: { type: 'number' } },
                { name: 'y', schema: { type: 'number' } },
                { name: 'width', schema: { type: 'number', minimum: 1 } },
                { name: 'height', schema: { type: 'number', minimum: 1 } },
                { name: 'color', schema: { type: 'string' } }
            ]
        }, (x, y, w, h, color = 'black') => {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        });

        registerPaintOp('line', {
            description: 'Draw a line segment',
            args: [
                { name: 'x1', schema: { type: 'number' } },
                { name: 'y1', schema: { type: 'number' } },
                { name: 'x2', schema: { type: 'number' } },
                { name: 'y2', schema: { type: 'number' } },
                { name: 'color', schema: { type: 'string' } },
                { name: 'lineWidth', schema: { type: 'number', minimum: 1 } }
            ]
        }, (x1, y1, x2, y2, color = 'black', width = 2) => {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
        });

        registerPaintOp('text', {
            description: 'Draw text',
            args: [
                { name: 'x', schema: { type: 'number' } },
                { name: 'y', schema: { type: 'number' } },
                { name: 'text', schema: { type: 'string' } },
                { name: 'color', schema: { type: 'string' } },
                { name: 'font', schema: { type: 'string' } }
            ]
        }, (x, y, text, color = 'black', font = '16px Arial') => {
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.fillText(text, x, y);
        });

        registerPaintOp('clear', {
            description: 'Clear the canvas',
            args: []
        }, () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function buildPaintBotJsonSchema() {
            const operationSchemas = Array.from(paintRegistry.values()).map((op) => ({
                type: 'object',
                additionalProperties: false,
                required: ['op', 'args'],
                properties: {
                    op: { const: op.name },
                    args: {
                        type: 'array',
                        prefixItems: op.args.map((arg) => arg.schema),
                        minItems: op.args.length,
                        maxItems: op.args.length
                    }
                }
            }));

            return {
                type: 'object',
                additionalProperties: false,
                required: ['operations'],
                properties: {
                    operations: {
                        type: 'array',
                        minItems: 1,
                        maxItems: 20,
                        items: {
                            oneOf: operationSchemas
                        }
                    }
                }
            };
        }

        function listRegisteredOps() {
            return Array.from(paintRegistry.values()).map((op) => {
                const signature = op.args.map((arg) => arg.name).join(', ');
                return `- PaintBot.${op.name}(${signature})`;
            }).join('\n');
        }

        function parseModelJson(raw) {
            if (raw && typeof raw === 'object') {
                return raw;
            }

            if (typeof raw !== 'string') {
                throw new Error('Model response was not JSON text or object');
            }

            const clean = raw
                .replace(/```json/gi, '')
                .replace(/```javascript/gi, '')
                .replace(/```/g, '')
                .trim();
            return JSON.parse(clean);
        }

        function isValueCompatibleWithSchema(value, schema) {
            if (!schema || !schema.type) {
                return true;
            }

            if (schema.type === 'number') {
                if (typeof value !== 'number' || Number.isNaN(value)) {
                    return false;
                }
                if (schema.minimum !== undefined && value < schema.minimum) {
                    return false;
                }
                if (schema.maximum !== undefined && value > schema.maximum) {
                    return false;
                }
                return true;
            }

            if (schema.type === 'string') {
                return typeof value === 'string';
            }

            return true;
        }

        function validatePaintPlan(plan) {
            if (!plan || !Array.isArray(plan.operations)) {
                throw new Error('Invalid plan: operations array missing');
            }

            for (const step of plan.operations) {
                const opMeta = paintRegistry.get(step.op);
                if (!opMeta) {
                    throw new Error(`Unknown PaintBot op: ${step.op}`);
                }
                if (!Array.isArray(step.args)) {
                    throw new Error(`Invalid args for ${step.op}: args must be an array`);
                }
                if (step.args.length !== opMeta.args.length) {
                    throw new Error(`Invalid args for ${step.op}: expected ${opMeta.args.length}, got ${step.args.length}`);
                }

                for (let i = 0; i < opMeta.args.length; i += 1) {
                    const argMeta = opMeta.args[i];
                    if (!isValueCompatibleWithSchema(step.args[i], argMeta.schema)) {
                        throw new Error(`Invalid ${argMeta.name} for ${step.op}`);
                    }
                }
            }
        }

        function executePaintPlan(plan) {
            validatePaintPlan(plan);

            for (const step of plan.operations) {
                const fn = PaintBot[step.op];
                if (typeof fn !== 'function') {
                    throw new Error(`Unknown PaintBot op: ${step.op}`);
                }
                fn(...step.args);
            }
        }

        const paintResponseSchema = buildPaintBotJsonSchema();

        // 3. SPEECH RECOGNITION SETUP
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recog = new Recognition();
        recog.continuous = false;
        recog.interimResults = false;

        // 4. PROMPT API LOGIC
        async function runAIPaint(command) {

            statusEl.innerText = `Status: AI is thinking... ${command}`;
            
            try {
                const session = await LanguageModel.create({
                   initialPrompts: [{role:'system', content:`
                                        You are a drawing assistant.
                                        You CANNOT execute code. You MUST return JSON only.
                                        Use ONLY these paint operations:
                                        ${listRegisteredOps()}

                                        Return an object in this exact format:
                                        {
                                            "operations": [{"op":"circle","args":[x,y,radius,"red"]}]
                                        }

                                        Args must match each operation signature exactly.
                                        Note for font: the font string is directly assigned to ctx.font (for example "bold 20px Arial").
                    
                    The current mouse position is x=${mouseX}, y=${mouseY}.
                    The canvas size is 800x500.
                                        The currently drawn items on screen are: ${PaintBot.history}
                                        Respond ONLY with JSON.
                    `},
                                        {role: 'assistant', content:'{"operations":['}]
                });

                let generatedPlan;
                try {
                    generatedPlan = await session.prompt(command, { responseConstraint: paintResponseSchema });
                } catch (constraintErr) {
                    generatedPlan = await session.prompt(command + '\n\nRespond with JSON only in the format {"operations":[{"op":"circle","args":[100,100,20,"red"]}]}');
                }

                const plan = parseModelJson(generatedPlan);
                
                logEl.innerText = "> Executing plan: " + JSON.stringify(plan, null, 2);
                executePaintPlan(plan);
                
                statusEl.innerText = "Status: Done!";
            } catch (err) {
                console.error(err);
                logEl.innerText = "> Error: " + (err?.message || String(err));
                statusEl.innerText = "Status: Error in AI generation";
            }
        }

        // 5. INPUT HANDLERS
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                statusEl.innerText = "Status: Listening...";
                recog.start();
            }
        });

        recog.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            statusEl.innerText = `Status: Heard "${transcript}"`;
            runAIPaint(transcript);
        };

        document.getElementById('clearBtn').onclick = () => PaintBot.clear();

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-p34f1UUtsS3wqzfto5wAAmdvj+osOnFyQFpp4Ua3gs/ZVWx6oOypYoCJhGGScy+8" crossorigin="anonymous"></script>
    <script src="/navbar.js"></script>
</body>
</html>
